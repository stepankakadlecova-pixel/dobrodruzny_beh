<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dobrodružný běh</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #cdefff;
      touch-action: manipulation;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-image: url("pozadi.png");
      background-size: cover;
      background-position: center bottom;
    }

    #score {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      font-size: clamp(22px, 4vw, 38px);
      font-weight: bold;
      color: #111;
      background: rgba(255,255,255,0.75);
      padding: 8px 14px;
      border-radius: 12px;
    }

    #player {
      position: absolute;
      left: 10vw;
      bottom: 18vh;
      width: clamp(90px, 14vw, 150px);
      z-index: 5;
    }

    .item,
    .obstacle {
      position: absolute;
      width: clamp(52px, 8vw, 80px);
      z-index: 4;
    }

    .item {
      bottom: 42vh;
    }

    .obstacle {
      bottom: 19vh;
    }

    #message {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(255,255,255,0.78);
      font-size: clamp(24px, 5vw, 44px);
      font-weight: bold;
      padding: 30px;
      line-height: 1.3;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="game">
    <div id="score">Body: 0</div>

    <img id="player" src="player-stoji.png" alt="Dobrodruh">

    <div id="message">
      Klikni nebo zmáčkni mezerník<br>
      a vyraz na výpravu!
    </div>
  </div>

  <script>
    const game = document.getElementById("game");
    const player = document.getElementById("player");
    const scoreText = document.getElementById("score");
    const message = document.getElementById("message");

    let score = 0;
    let isGameRunning = false;
    let isJumping = false;
    let playerBottom = 18;
    let velocity = 0;
    let gameSpeed = 5;
    let spawnTimer;

    const gravity = 0.9;
    const jumpPower = 18;

    const runImages = [
      "player-beh1.png",
      "player-beh2.png"
    ];

    const collectImages = [
      "kompas.png",
      "mapa.png",
      "baterka.png",
      "dalekohled.png",
      "lahev.png",
      "lekarnicka.png",
      "svacina.png",
      "stan.png",
      "fotoaparat.png"
    ];

    const obstacleImages = [
      "ul.png",
      "bourkovy_mrak.png",
      "blato.png",
      "strom.png",
      "most.png",
      "jedovata_houba.png",
      "medvedi-trus.png",
      "skala.png"
    ];

    function startGame() {
      if (!isGameRunning) {
        isGameRunning = true;
        message.classList.add("hidden");
        score = 0;
        scoreText.textContent = "Body: 0";
        spawnObjects();
        gameLoop();
      } else {
        jump();
      }
    }

    function jump() {
      if (!isJumping) {
        isJumping = true;
        velocity = jumpPower;
        player.src = "player-skok.png";
      }
    }

    function gameLoop() {
      if (!isGameRunning) return;

      if (isJumping) {
        playerBottom += velocity * 0.6;
        velocity -= gravity;

        if (playerBottom <= 18) {
          playerBottom = 18;
          isJumping = false;
        }

        player.style.bottom = playerBottom + "vh";
      }

      document.querySelectorAll(".item, .obstacle").forEach(obj => {
        let left = parseFloat(obj.style.left);
        left -= gameSpeed;
        obj.style.left = left + "px";

        if (left < -150) {
          obj.remove();
        }

        if (checkCollision(player, obj)) {
          if (obj.classList.contains("item")) {
            score += 5;
          } else {
            score -= 5;
          }

          scoreText.textContent = "Body: " + score;
          obj.remove();
        }
      });

      requestAnimationFrame(gameLoop);
    }

    function spawnObjects() {
      if (!isGameRunning) return;

      const isItem = Math.random() > 0.45;
      const img = document.createElement("img");

      if (isItem) {
        img.className = "item";
        img.src = collectImages[Math.floor(Math.random() * collectImages.length)];
      } else {
        img.className = "obstacle";
        img.src = obstacleImages[Math.floor(Math.random() * obstacleImages.length)];
      }

      img.style.left = window.innerWidth + "px";
      game.appendChild(img);

      const delay = Math.random() * 1200 + 900;
      spawnTimer = setTimeout(spawnObjects, delay);
    }

    function checkCollision(a, b) {
      const r1 = a.getBoundingClientRect();
      const r2 = b.getBoundingClientRect();

      const padding = 15;

      return !(
        r1.right - padding < r2.left + padding ||
        r1.left + padding > r2.right - padding ||
        r1.bottom - padding < r2.top + padding ||
        r1.top + padding > r2.bottom - padding
      );
    }

    setInterval(() => {
      if (isGameRunning && !isJumping) {
        player.src = runImages[Math.floor(Math.random() * runImages.length)];
      }
    }, 180);

    document.addEventListener("keydown", e => {
      if (e.code === "Space") {
        e.preventDefault();
        startGame();
      }
    });

    document.addEventListener("click", startGame);
    document.addEventListener("touchstart", startGame);
  </script>
</body>
</html>
