<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Stopařská akademie</title>

<link rel="icon" type="image/png" href="favicon.png">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #cdefff;
      touch-action: manipulation;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-image: url("pozadi.png");
      background-size: cover;
      background-position: center bottom;
    }

@media (max-width: 700px) {
  #hud {
    flex-direction: column;
    top: 300px;
  }


  .hud-box {
    font-size: 18px;
    padding: 7px 10px;
  }


}

    .hud-box {
      font-size: clamp(16px, 3vw, 28px);
      font-weight: bold;
      color: #111;
      background: rgba(255,255,255,0.82);
      padding: 8px 12px;
      border-radius: 12px;
      border: 2px solid rgba(0,0,0,0.15);
    }

    #player {
      position: absolute;
      left: 9vw;
      bottom: 18vh;
      width: clamp(90px, 14vw, 150px);
      z-index: 5;
    }

    .item,
    .obstacle {
      position: absolute;
      width: clamp(55px, 8vw, 85px);
      z-index: 4;
    }

    .item {
      bottom: 24vh;
    }

    .obstacle {
      bottom: 25vh;
    }

    #startScreen,
    #endScreen {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(255,255,255,0.84);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .panel {
      max-width: 700px;
      width: min(92vw, 700px);
      background: white;
      border: 4px solid #111;
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.25);
      pointer-events: auto;
    }

    .startLogo {
      width: min(70vw, 90px);
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(30px, 6vw, 56px);
      margin-bottom: 16px;
      color: #f26a13;
      -webkit-text-stroke: 1px #111;
    }

    p {
      font-size: clamp(19px, 4vw, 30px);
      line-height: 1.35;
      margin-bottom: 16px;
      font-weight: bold;
    }

    button {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: bold;
      padding: 14px 30px;
      border: 3px solid #111;
      border-radius: 18px;
      background: #f26a13;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 0 #111;
      pointer-events: auto;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #111;
    }

    .hidden {
      display: none !important;
    }

  @media (max-width: 700px) {
  #logoSmall {
    width: 120px;
    top: 105px;
    right: 12px;
    bottom: auto;
  }

  #hud {
    top: 105px;
    left: 12px;
    max-width: 70vw;
  }
}

      .item {
        bottom: 41vh;
      }
    }
    html, body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
}

body {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}


  h1 {
    font-size: 46px;
    margin: 4px 0 8px;
  }

  .panel,
  .choice {
    padding: 14px;
    margin: 10px auto;
    border-radius: 20px;
  }

  p,
  .stats {
    font-size: 21px;
  }

  button {
    font-size: 22px;
    padding: 10px 18px;
    margin: 6px;
  }

  .topbar {
    position: sticky;
    top: env(safe-area-inset-top);
    z-index: 20;
    font-size: 20px;
    gap: 8px;
    padding: 8px;
    margin-bottom: 12px;
    border-radius: 0 0 18px 18px;
  }

  .players {
    margin-bottom: 10px;
  }

  .player-box {
    font-size: 18px;
    padding: 7px 10px;
  }

  .board {
    width: 100%;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 12px auto 24px;
  }

  .card {
    min-height: 112px;
    border-width: 3px;
    border-radius: 16px;
    padding: 6px;
  }

  .card img {
    height: 82px;
  }

  .card-back {
    font-size: 56px;
  }
}

@media (max-width: 430px) {
  .board {
    grid-template-columns: repeat(3, 1fr);
  }

  .card {
    min-height: 104px;
  }

  .card img {
    height: 76px;
  }

  .topbar {
    font-size: 18px;
  }
}
    @media (max-width: 700px) {
  #endScreen .panel {
    transform: translateY(-60px);
  }
}
  </style>
</head>

<body>
  <div id="game">

   <audio id="bgMusic" loop>
   <source src="hudba.mp3" type="audio/mpeg">
</audio>

    <img id="logoSmall" src="logo.png" alt="Pro malé dobrodruhy">

    <div id="hud">
      <div class="hud-box" id="scoreText">Skóre: 0</div>
      <div class="hud-box" id="timeText">Čas: 60</div>
      <div class="hud-box" id="recordText">Rekord: 0</div>
    </div>

    <img id="player" src="player-stoji.png" alt="Dobrodruh">

    <div id="startScreen">
      <div class="panel">
        <img class="startLogo" src="logo.png" alt="Pro malé dobrodruhy">

        <p>
          Pochytej si věci, které potřebuješ na výpravu,<br>
          a vyhni se překážkám!
        </p>

        <p>⏱️ Máš 60 sekund.</p>
        <p id="mainRecord">Rekord: 0</p>

        <button id="startButton" type="button">START</button>
      </div>
    </div>

    <div id="endScreen" class="hidden">
      <div class="panel">
        <img class="startLogo" src="logo.png" alt="Pro malé dobrodruhy">

        <h1>Konec výpravy!</h1>
        <p id="finalScore">Skóre: 0</p>
        <p id="finalRecord">Rekord: 0</p>

        <button id="restartButton" type="button">HRÁT ZNOVU</button>

<br><br>

<button
  id="shopButton"
  type="button"
  onclick="window.open('https://www.promaledobrodruhy.cz','_blank')">
  🎒 SKOČ I TY PRO SVOU VÝBAVU
</button>
      </div>
    </div>

  </div>

  <script>
    const game = document.getElementById("game");
    const player = document.getElementById("player");
    const music = document.getElementById("bgMusic");

    music.loop = true;

music.addEventListener("ended", () => {
    music.currentTime = 0;
    music.play();
});

    const scoreText = document.getElementById("scoreText");
    const timeText = document.getElementById("timeText");
    const recordText = document.getElementById("recordText");
    const mainRecord = document.getElementById("mainRecord");

    const startScreen = document.getElementById("startScreen");
    const endScreen = document.getElementById("endScreen");

    const finalScore = document.getElementById("finalScore");
    const finalRecord = document.getElementById("finalRecord");

    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");

    let score = 0;
    let timeLeft = 60;
    let record = Number(localStorage.getItem("stoparskaAkademieRecord")) || 0;

    let isGameRunning = false;
    let isJumping = false;
    let playerBottom = 18;
    let velocity = 0;
    let gameSpeed = window.innerWidth < 700 ? 5 : 2.5;

    let spawnTimer = null;
    let countdownTimer = null;
    let animationFrame = null;

    
    const isMobile = window.innerWidth < 700;

const gravity = isMobile ? 0.8 : 0.8;
const jumpPower = isMobile ? 11 : 12;

    const runImages = [
      "player-beh1.png",
      "player-beh2.png"
    ];

   const collectImages = [
  { src: "kompas.png", points: 5, type: "normal" },
  { src: "mapa.png", points: 5, type: "normal" },
  { src: "baterka.png", points: 5, type: "normal" },
  { src: "dalekohled.png", points: 5, type: "normal" },
  { src: "lahev.png", points: 5, type: "normal" },
  { src: "lekarnicka.png", points: 5, type: "normal" },
  { src: "svacina.png", points: 5, type: "normal" },
  { src: "stan.png", points: 5, type: "normal" },
  { src: "fotoaparat.png", points: 5, type: "normal" },
  { src: "stopa.png", points: 10, type: "normal" },
  { src: "hvezda.png", points: 0, type: "double" }
];

   const obstacleImages = [
  { src: "ul.png", points: -5, type: "obstacle" },
  { src: "bourkovy_mrak.png", points: -5, type: "obstacle" },
  { src: "blato.png", points: -5, type: "obstacle" },
  { src: "strom.png", points: -5, type: "obstacle" },
  { src: "most.png", points: -5, type: "obstacle" },
  { src: "jedovata_houba.png", points: -5, type: "obstacle" },
  { src: "medvedi-trus.png", points: -5, type: "obstacle" },
  { src: "skala.png", points: -5, type: "obstacle" },
  { src: "ohen.png", points: -20, type: "fire" }
];

    updateRecordTexts();

    function updateRecordTexts() {
      recordText.textContent = "Rekord: " + record;
      mainRecord.textContent = "Rekord: " + record;
    }

    function startGame() {
      score = 0;
      timeLeft = 60;
      isGameRunning = true;
      isJumping = false;
      playerBottom = 18;
      velocity = 0;

      scoreText.textContent = "Skóre: 0";
      timeText.textContent = "Čas: 60";

     playerBottom = isMobile ? 24 : 18;
player.style.bottom = playerBottom + "vh";

      document.querySelectorAll(".item, .obstacle").forEach(obj => obj.remove());

      startScreen.classList.add("hidden");
      endScreen.classList.add("hidden");

      clearTimeout(spawnTimer);
      clearInterval(countdownTimer);
      cancelAnimationFrame(animationFrame);

     music.volume = 0.35;
music.play().catch(() => {});

      spawnObjects();
      gameLoop();

      countdownTimer = setInterval(() => {
        if (!isGameRunning) return;

        timeLeft--;
        timeText.textContent = "Čas: " + timeLeft;

        if (timeLeft <= 0) {
          finishGame();
        }
      }, 1000);
    }

    function jump() {
      if (!isGameRunning) return;

      if (!isJumping) {
        isJumping = true;
        velocity = jumpPower;
        player.src = "player-skok.png";
      }
    }

    function gameLoop() {
      if (!isGameRunning) return;

      if (isJumping) {
        playerBottom += velocity * 0.6;
        velocity -= gravity;
const groundLevel = isMobile ? 24 : 18;

if (playerBottom <= groundLevel) {
  playerBottom = groundLevel;
          isJumping = false;
        }

        player.style.bottom = playerBottom + "vh";
      }

      document.querySelectorAll(".item, .obstacle").forEach(obj => {
        let left = parseFloat(obj.style.left);
        left -= gameSpeed;
        obj.style.left = left + "px";

       // bonus za přeskočení překážky
if (
  obj.classList.contains("obstacle") &&
  obj.dataset.passed === "false" &&
  left + obj.offsetWidth < player.offsetLeft
) {
  score += 2;
  obj.dataset.passed = "true";
  scoreText.textContent = "Skóre: " + score;
}

if (left < -160) {
  obj.remove();
  return;
}

if (checkCollision(player, obj)) {
  const type = obj.dataset.type;
  const points = Number(obj.dataset.points);

  if (type === "double") {
    score *= 2;
  } else {
    score += points;
  }

  scoreText.textContent = "Skóre: " + score;
  obj.remove();
}
      });

      animationFrame = requestAnimationFrame(gameLoop);
    }

    function spawnObjects() {
      if (!isGameRunning) return;

      const isItem = Math.random() > 0.45;
      const img = document.createElement("img");

      let selected;

if (isItem) {
  selected = collectImages[Math.floor(Math.random() * collectImages.length)];
  img.className = "item";
} else {
  selected = obstacleImages[Math.floor(Math.random() * obstacleImages.length)];
  img.className = "obstacle";
}

img.src = selected.src;
img.dataset.points = selected.points;
img.dataset.type = selected.type;
img.dataset.passed = "false";

      img.style.left = window.innerWidth + "px";
      game.appendChild(img);

      const delay = Math.random() * 1200 + 850;
      spawnTimer = setTimeout(spawnObjects, delay);
    }

    function checkCollision(a, b) {
      const r1 = a.getBoundingClientRect();
      const r2 = b.getBoundingClientRect();
      const padding = window.innerWidth < 700 ? 18 : 32;

      return !(
        r1.right - padding < r2.left + padding ||
        r1.left + padding > r2.right - padding ||
        r1.bottom - padding < r2.top + padding ||
        r1.top + padding > r2.bottom - padding
      );
    }

    function finishGame() {
      isGameRunning = false;

      clearTimeout(spawnTimer);
      clearInterval(countdownTimer);
      cancelAnimationFrame(animationFrame);

      document.querySelectorAll(".item, .obstacle").forEach(obj => obj.remove());

      

      if (score > record) {
        record = score;
        localStorage.setItem("stoparskaAkademieRecord", record);
      }

      updateRecordTexts();

      finalScore.textContent = "Skóre: " + score;
      finalRecord.textContent = "Rekord: " + record;

      endScreen.classList.remove("hidden");
      player.src = "player-stoji.png";
    }

    setInterval(() => {
      if (isGameRunning && !isJumping) {
        player.src = runImages[Math.floor(Math.random() * runImages.length)];
      }
    }, 180);

    document.addEventListener("keydown", e => {
      if (e.code === "Space") {
        e.preventDefault();

        if (!startScreen.classList.contains("hidden")) {
          startGame();
        } else if (!endScreen.classList.contains("hidden")) {
          startGame();
        } else {
          jump();
        }
      }
    });

    game.addEventListener("click", e => {
      if (e.target.tagName === "BUTTON") return;

      if (!startScreen.classList.contains("hidden")) return;
      if (!endScreen.classList.contains("hidden")) return;

      jump();
    });

    game.addEventListener("touchstart", e => {
      if (e.target.tagName === "BUTTON") return;

      e.preventDefault();

      if (!startScreen.classList.contains("hidden")) return;
      if (!endScreen.classList.contains("hidden")) return;

      jump();
    }, { passive: false });

    startButton.addEventListener("click", e => {
      e.stopPropagation();
      startGame();
    });

    restartButton.addEventListener("click", e => {
      e.stopPropagation();
      startGame();
    });
  </script>
</body>
</html>
